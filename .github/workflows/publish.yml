name: brew pr-pull

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number
        required: true
      head_sha:
        description: Expected pull request head commit SHA (optional)

jobs:
  pr-pull:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1

      - name: Check for already-published bottles
        id: published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ inputs.pull_request }}
        run: |
          set -euo pipefail

          pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PULL_REQUEST}")"
          if [[ "$(jq -r '.merged' <<<"$pr_json")" != "true" ]]
          then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "base_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "base_sha=$(jq -r '.base.sha' <<<"$pr_json")" >> "$GITHUB_OUTPUT"

          files_json="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PULL_REQUEST}/files")"
          formulae="$(jq -r '.[].filename | select(startswith("Formula/") and endswith(".rb")) | sub("^Formula/"; "") | sub("\\.rb$"; "")' <<<"$files_json" | sort -u)"
          if [[ -z "$formulae" ]]
          then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing=0
          for formula in $formulae
          do
            if ! grep -q "^[[:space:]]*bottle do" "Formula/${formula}.rb"
            then
              missing=1
            fi
          done

          if [[ "$missing" -eq 0 ]]
          then
            echo "Formula bottles are already published on main."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull bottles
        if: steps.published.outputs.skip != 'true'
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ steps.published.outputs.base_sha }}
          HEAD_SHA: ${{ inputs.head_sha }}
          PULL_REQUEST: ${{ inputs.pull_request }}
        run: |
          tap_repository="$(brew --repository "$GITHUB_REPOSITORY")"
          if [[ -n "$BASE_SHA" ]]
          then
            # `brew pr-pull` cherry-picks the PR. For a merged PR, start from
            # its original base so that cherry-pick is not empty.
            git -C "$tap_repository" reset --hard "$BASE_SHA"
            # Homebrew uses this workflow SHA to determine which formulae
            # changed. Compare against the PR base while replaying it.
            export GITHUB_SHA="$BASE_SHA"
          fi

          if [[ -n "$HEAD_SHA" ]]
          then
            brew pr-pull --debug --tap="$GITHUB_REPOSITORY" --head-sha="$HEAD_SHA" "$PULL_REQUEST"
          else
            brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"
          fi

          if [[ -n "$BASE_SHA" ]]
          then
            # Keep only the bottle commit: the formula PR is already on main.
            bottle_commit="$(git -C "$tap_repository" rev-parse HEAD)"
            git -C "$tap_repository" fetch origin main
            git -C "$tap_repository" reset --hard origin/main
            git -C "$tap_repository" cherry-pick "$bottle_commit"
          fi

      - name: Push commits
        if: steps.published.outputs.skip != 'true'
        uses: Homebrew/actions/git-try-push@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
        with:
          branch: main
